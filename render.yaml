services:
  - type: web
    name: hackvote-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false        # you paste this manually in Render dashboard
      - key: ADMIN_PIN
        sync: false
      - key: FRONTEND_URL
        sync: false
